<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Náklady — Prihlásenie</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  body { background: #1e2a3a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #fff; border-radius: 14px; padding: 40px 36px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .brand-icon { font-size: 2.2rem; color: #0891b2; }
</style>
</head>
<body>
  <div class="login-card text-center">
    <i class="bi bi-graph-up brand-icon"></i>
    <h5 class="mt-2 mb-1 fw-semibold">Náklady — prevádzky</h5>
    <p class="text-muted small mb-4">Zadajte heslo pre vstup</p>
    {% if error %}
    <div class="alert alert-danger py-2 small text-start">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <input type="password" name="password" class="form-control form-control-lg text-center"
               placeholder="••••••••" autofocus>
      </div>
      <button type="submit" class="btn w-100 btn-lg" style="background:#0891b2;color:#fff">Vstúpiť</button>
    </form>
  </div>
</body>
</html>
